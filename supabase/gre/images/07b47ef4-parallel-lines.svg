<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200" font-family="serif" font-size="16">
  <!-- Top parallel line AC -->
  <line x1="30" y1="40" x2="470" y2="40" stroke="#333" stroke-width="2"/>
  <!-- Bottom parallel line EG -->
  <line x1="30" y1="160" x2="470" y2="160" stroke="#333" stroke-width="2"/>

  <!-- Triangle WXZ: W on top, X on bottom, Z on top -->
  <line x1="80" y1="40" x2="220" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="220" y1="160" x2="400" y2="40" stroke="#333" stroke-width="1.5"/>

  <!-- Dashed line WY -->
  <line x1="80" y1="40" x2="380" y2="160" stroke="#333" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Points -->
  <circle cx="80" cy="40" r="4" fill="#333"/>
  <circle cx="400" cy="40" r="4" fill="#333"/>
  <circle cx="220" cy="160" r="4" fill="#333"/>
  <circle cx="380" cy="160" r="4" fill="#333"/>

  <!-- Labels -->
  <text x="68" y="30" font-style="italic" fill="#333">W</text>
  <text x="395" y="30" font-style="italic" fill="#333">Z</text>
  <text x="210" y="185" font-style="italic" fill="#333">X</text>
  <text x="375" y="185" font-style="italic" fill="#333">Y</text>

  <!-- Line labels -->
  <text x="15" y="38" font-size="13" fill="#666">A</text>
  <text x="475" y="38" font-size="13" fill="#666">C</text>
  <text x="15" y="158" font-size="13" fill="#666">B</text>
  <text x="475" y="158" font-size="13" fill="#666">D</text>
</svg>
